# Nginx BASE mode — WS+TLS
# Nginx слушает 443 напрямую с SSL
# WS проксируется на Xray, остальной трафик → фейковый сайт

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name __DOMAIN__;

    ssl_certificate     /etc/nginx/cert/cert.pem;
    ssl_certificate_key /etc/nginx/cert/cert.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    location __WS_PATH__ {
        proxy_pass http://127.0.0.1:__XRAY_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_socket_keepalive on;

        access_log             off;
        error_log              /dev/null crit;
    }

    location ~ ^/sub/[A-Za-z0-9_-]+_[A-Za-z0-9]+\.html$ {
        root /usr/local/etc/xray;
        try_files $uri =404;
        types { text/html html; }
        add_header Cache-Control 'no-cache, no-store, must-revalidate';
    }

    location ~ ^/sub/[A-Za-z0-9_-]+_[A-Za-z0-9]+\.txt$ {
        root /usr/local/etc/xray;
        try_files $uri =404;
        default_type text/plain;
        add_header Content-Disposition "attachment; filename=\"$sub_label.txt\"";
        add_header profile-title "$sub_label";
        add_header Cache-Control 'no-cache, no-store, must-revalidate';
    }

    location / {
        proxy_pass __PROXY_URL__;
        proxy_http_version 1.1;
        proxy_set_header Host __PROXY_HOST__;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_read_timeout 60s;

        proxy_hide_header X-Powered-By;
        proxy_hide_header Via;
        proxy_hide_header X-Cache;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header X-Runtime;
        proxy_hide_header Server;
    }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}

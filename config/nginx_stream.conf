# Nginx STREAM SNI mode — WS + Reality на 443 через SNI
# Это ПОЛНЫЙ nginx.conf с stream{} и http{} блоками
user www-data;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

# ── Stream: SNI-маршрутизация на порту 443 ──────────────────────────────────
stream {
    map $ssl_preread_server_name $upstream_backend {
        __WS_DOMAIN__   127.0.0.1:7443;
        default         127.0.0.1:__REALITY_PORT__;
    }

    tcp_nodelay on;

    server {
        listen 443;
        listen [::]:443;
        ssl_preread on;
        proxy_pass $upstream_backend;
        proxy_connect_timeout 120s;
        proxy_timeout         3600s;
        proxy_socket_keepalive on;
    }
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nodelay on;
    keepalive_timeout 75s;
    keepalive_requests 10000;

    server_tokens off;
    gzip on;
    gzip_vary on;
    gzip_proxied off;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss;
    include /etc/nginx/conf.d/*.conf;
}

# Nginx VISION mode — Vision на 443 напрямую, Nginx для fallback
# Nginx слушает 127.0.0.1:7443 БЕЗ SSL — только HTTP для fallback от Xray-Vision
# Xray-Vision делает TLS termination на 443, fallback идёт расшифрованный HTTP
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 127.0.0.1:7443;
    server_name __VISION_DOMAIN__;

    location / {
        proxy_pass __PROXY_URL__;
        proxy_http_version 1.1;
        proxy_set_header Host __PROXY_HOST__;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_read_timeout 60s;

        proxy_hide_header X-Powered-By;
        proxy_hide_header Via;
        proxy_hide_header X-Cache;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header X-Runtime;
        proxy_hide_header Server;
    }

    location ~ ^__PATH__$ {
        proxy_pass http://127.0.0.1:45000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        
        client_max_body_size 0;
        proxy_request_buffering off;
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
        
        proxy_hide_header X-Powered-By;
        proxy_hide_header Via;
        proxy_hide_header X-Cache;
        proxy_hide_header Server;
    }

    location ~ ^/sub/[A-Za-z0-9_-]+_[A-Za-z0-9]+\.html$ {
        root /usr/local/etc/xray;
        try_files $uri =404;
        types { text/html html; }
        add_header Cache-Control 'no-cache, no-store, must-revalidate';
    }

    location ~ ^/sub/[A-Za-z0-9_-]+_[A-Za-z0-9]+\.txt$ {
        root /usr/local/etc/xray;
        try_files $uri =404;
        default_type text/plain;
        add_header Content-Disposition "attachment; filename=\"$sub_label.txt\"";
        add_header profile-title "$sub_label";
        add_header Cache-Control 'no-cache, no-store, must-revalidate';
    }

    access_log off;
    error_log  /dev/null crit;
}
